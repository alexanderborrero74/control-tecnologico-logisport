<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NexoTI logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#007acc"></stop>
      <stop offset="100%" stop-color="#0ea5e9"></stop>
    </linearGradient>
  </defs>

  <!-- Ícono: hub de 4 nodos -->
  <g transform="translate(20,20)">
    <circle cx="30" cy="30" r="10" fill="url(#g)"></circle>
    <circle cx="90" cy="30" r="10" fill="#0ea5e9"></circle>
    <circle cx="30" cy="90" r="10" fill="#0ea5e9"></circle>
    <circle cx="90" cy="90" r="10" fill="url(#g)"></circle>
    <line x1="30" y1="30" x2="90" y2="30" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"></line>
    <line x1="30" y1="30" x2="30" y2="90" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"></line>
    <line x1="90" y1="30" x2="90" y2="90" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"></line>
    <line x1="30" y1="90" x2="90" y2="90" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"></line>
    <circle cx="60" cy="60" r="8" fill="#111827"></circle>
  </g>

  <!-- Wordmark -->
  <g transform="translate(150,38)">
    <text x="0" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" font-size="64" fill="#111827" letter-spacing="0.5">
      Nexo<tspan fill="url(#g)">TI</tspan>
    </text>
    <text x="2" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600" font-size="18" fill="#334155">
      Trazabilidad y control en un solo lugar
    </text>
  </g>
</svg>
